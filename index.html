<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Print Solutions</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header" id="header">
    <div class="container nav-container">
      <div class="logo">
        <img src="images/logo.png" alt="Smart Print Solutions Logo" />
        <span>Smart Print <span class="accent">Solutions</span></span>
      </div>
      <nav class="nav" id="nav">
        <ul>
          <li><a href="#home">Home</a></li>
          <li><a href="#services">Services</a></li>
          <li><a href="#about">About</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
      <div class="hamburger" id="hamburger">
        <i class="fas fa-bars"></i>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero" id="home">
    <div class="container hero-container">
      <div class="hero-text">
        <h1>Your One-Stop <span class="accent">Printing & Tech</span> Solutions</h1>
        <p>Professional printing services and expert computer repairs — all under one roof. Quality you can trust, service you'll love.</p>
        <div class="hero-btns">
          <a href="#services" class="btn btn-primary">Our Services</a>
          <a href="#contact" class="btn btn-secondary">Get a Quote</a>
        </div>
      </div>
      <div class="hero-image">
        <img src="images/hero.png" alt="Smart Print Solutions" />
      </div>
    </div>
  </section>
  <!-- SERVICES (Stage 4) -->
  <!-- ABOUT (Stage 5) -->
  <!-- CONTACT (Stage 6) -->
  <!-- FOOTER (Stage 7) -->

  <script src="js/main.js"></script>
</body>
</html>
